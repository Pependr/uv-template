on:
    push:
        branches:
            - "master"
            - "main"

jobs:
    run_and_test:
        runs-on: "ubuntu-latest"
        
        steps:
            - uses: actions/checkout@v4

            - name: "Install uv"
              uses: astral-sh/setup-uv@v7
              with:
                enable-cache: true
                cache-local-path: "**/.uv_cache"
                python-version: '3.14.5'

            - name: "Install dependencies"
              run: uv sync --frozen

            - name: "Run Ruff checker"
              run: uv run ruff check --show-fixes

            - name: "Run Ruff linter"
              run: uv run ruff format --check

            - name: "Run Pytest"
              run: uv run pytest --tb=short --cov

            - name: "Collect coverage report"
              run: uv run pytest --cov --cov-report json

            - name: "Prettify json report"
              run: uv run -m json.tool coverage.json report.json

            - name: "Upload report artifact"
              uses: actions/upload-artifact@v7
              with:
                name: "Coverage report"
                path: "report.json"
                archive: false
