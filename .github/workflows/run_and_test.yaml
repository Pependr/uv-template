on:
    push:
        branches:
            - "master"
            - "main"

jobs:
    run_and_test:
        runs-on: "ubuntu-latest"
        
        steps:
            - uses: actions/checkout@v4

            - name: "Install UV"
              uses: astral-sh/setup-uv@v7

            - name: "Setup Python"
              run: uv python install 3.14.4

            - name: "Install dependencies"
              run: uv sync --dev

            - name: "Run Ruff checker"
              run: uv run ruff check --show-fixes

            - name: "Run Ruff linter"
              run: uv run ruff format --check

            - name: "Run Pytest and collect coverage"
              run: uv run pytest --cov --cov-report json

            - name: "Prettify json report"
              run: uv run -m json.tool coverage.json report.json

            - name: "Upload report artifact"
              uses: actions/upload-artifact@v7
              with:
                name: "Coverage report"
                path: "./report.json"
                archive: false
